name: Panoptes Zero-Trust Matrix

on:
  push:
    paths:
      - 'panoptes/**'
  workflow_dispatch:
    inputs:
      run_cross_tests:
        description: 'Run Cross-Platform Matrix (Requires Diag/Obf build with 600s timeout)'
        required: true
        type: boolean
        default: false

jobs:
  audit_and_generate:
    name: Ring 3 Audit & Gen (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21 (Adoptium)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify Integrity (Checksums)
        shell: bash
        run: |
          cd panoptes
          echo "[*] Verifying binary integrity..."
          if [ "$RUNNER_OS" != "Windows" ]; then
            sha1sum -c checksum.sha1 || echo "[WARNING] Checksum mismatch."
          else
            echo "[*] Skipping strict checksum on Windows runner."
          fi

      - name: Run Panoptes Blind Smoke Test
        shell: bash
        run: |
          cd panoptes
          echo "=========================================================="
          echo "[*] INITIATING BLIND AUDIT ON: ${{ matrix.os }}"
          echo "=========================================================="
          java --enable-native-access=ALL-UNNAMED -Djava.library.path=. -cp CoronaPokerGithub.jar PublicTestSuite smoke

      - name: Generate Cross-Platform Payload
        shell: bash
        run: |
          cd panoptes
          echo "[*] Generating cryptographically signed payload for ${{ matrix.os }}..."
          java --enable-native-access=ALL-UNNAMED -Djava.library.path=. -cp CoronaPokerGithub.jar PublicTestSuite generate payload_${{ matrix.os }}.bin

      - name: Upload Payload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: payload-${{ matrix.os }}
          path: panoptes/payload_${{ matrix.os }}.bin
          retention-days: 1

  audit_and_generate_freebsd:
    name: Ring 3 Audit & Gen (freebsd)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run FreeBSD VM (Audit & Generate)
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg update -f
            pkg install -y openjdk21
          run: |
            cd panoptes
            echo "[*] Verifying binary integrity..."
            sha1sum -c checksum.sha1 || echo "[WARNING] Checksum mismatch."
            
            echo "=========================================================="
            echo "[*] INITIATING BLIND AUDIT ON: FreeBSD"
            echo "=========================================================="
            java --enable-native-access=ALL-UNNAMED -Djava.library.path=. -cp CoronaPokerGithub.jar PublicTestSuite smoke
            
            echo "[*] Generating cryptographically signed payload for freebsd..."
            java --enable-native-access=ALL-UNNAMED -Djava.library.path=. -cp CoronaPokerGithub.jar PublicTestSuite generate payload_freebsd.bin

      - name: Upload Payload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: payload-freebsd
          path: panoptes/payload_freebsd.bin
          retention-days: 1

  cross_validation:
    name: Cross-Platform MAC Verification (${{ matrix.os }})
    needs: [audit_and_generate, audit_and_generate_freebsd] # Wait for all 4 machines to generate payloads
    if: github.event_name == 'workflow_dispatch' && inputs.run_cross_tests == true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21 (Adoptium)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download All Payloads
        uses: actions/download-artifact@v4
        with:
          path: panoptes/payloads/ # Payloads will be downloaded in separate folders

      - name: Execute Triple Cross-Platform Verification
        shell: bash
        run: |
          cd panoptes
          echo "=========================================================="
          echo "[*] EXECUTING TRIPLE CROSS-PLATFORM BOMBARDMENT ON: ${{ matrix.os }}"
          echo "=========================================================="
          
          # Find all downloaded payloads
          for payload in $(find payloads/ -type f -name "*.bin"); do
            FILENAME=$(basename "$payload")
            
            # Extract origin OS from filename
            ORIGIN_OS=${FILENAME#payload_}
            ORIGIN_OS=${ORIGIN_OS%.bin}
            
            # Skip if it is our own payload
            if [ "$ORIGIN_OS" == "${{ matrix.os }}" ]; then
              echo -e "\n[-] Skipping own payload ($ORIGIN_OS)..."
              continue
            fi

            echo -e "\n[*] Cross-Testing: [Origin: $ORIGIN_OS] ---> [Destination: ${{ matrix.os }}]"
            java --enable-native-access=ALL-UNNAMED -Djava.library.path=. -cp CoronaPokerGithub.jar PublicTestSuite verify "$payload"
          done

  cross_validation_freebsd:
    name: Cross-Platform MAC Verification (freebsd)
    needs: [audit_and_generate, audit_and_generate_freebsd] # Wait for all payloads
    if: github.event_name == 'workflow_dispatch' && inputs.run_cross_tests == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Payloads
        uses: actions/download-artifact@v4
        with:
          path: panoptes/payloads/

      - name: Run FreeBSD VM (Cross-Validation)
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg update -f
            pkg install -y openjdk21 bash
          run: |
            cd panoptes
            echo "=========================================================="
            echo "[*] EXECUTING CROSS-PLATFORM BOMBARDMENT ON: FreeBSD"
            echo "=========================================================="
            
            # Standard shell loop to iterate through payloads
            for payload in $(find payloads/ -type f -name "*.bin"); do
              FILENAME=$(basename "$payload")
              
              ORIGIN_OS=${FILENAME#payload_}
              ORIGIN_OS=${ORIGIN_OS%.bin}
              
              if [ "$ORIGIN_OS" = "freebsd" ]; then
                echo -e "\n[-] Skipping own payload ($ORIGIN_OS)..."
                continue
              fi

              echo -e "\n[*] Cross-Testing: [Origin: $ORIGIN_OS] ---> [Destination: FreeBSD]"
              java --enable-native-access=ALL-UNNAMED -Djava.library.path=. -cp CoronaPokerGithub.jar PublicTestSuite verify "$payload"
            done
