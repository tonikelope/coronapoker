player.en_el_bmodo_recuperacionb_se=In <b>RECOVERY MODE</b> the previous game will continue from where it stopped:\n\n1) It is <b>MANDATORY</b> that old players use the <b>SAME NICKS</b>.\n\n2) To continue from the <b>EXACT POINT</b> of the hand it is <b>MANDATORY</b> that <b>ALL</b> old players reconnect. If this is not possible, the hand in progress when the game was interrupted will be lost.\n\n3) <b>New players</b> are allowed to join the game (they will be spectators for the first hand).
