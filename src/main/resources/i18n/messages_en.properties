zero_trust.critical=\u274c [ZERO-TRUST] CRITICAL ALERT: INVALID SIGNATURE OR BROKEN CONSENSUS.
zero_trust.critical_alert_body=QUARANTINE STATE ACTIVATED:\nYour client WILL NOT send any more cryptographic keys to the server in this session.\nThe game is mathematically frozen to protect your balance.\n\nThe POSSIBLE causes are:\n  - a BUG in the client code itself,\n  - a BUG in the server code, or\n  - a SERVER whose code may have been altered.\n\nThe client cannot distinguish between them and NO accusation is implied. For safety, and pending review of the root cause, it is RECOMMENDED that you LEAVE this game using the 'Exit' button (your money will NOT be processed in this hand).
