player.en_el_bmodo_recuperacionb_se=In the <b>RECOVERY MODE</b> the previous game will be continued from where it was stopped:\n\n1) It is <b>MANDATORY</b> that the old players use the <b>SAME NICKS</b>.\n\n2) In order to continue from the <b>EXACT POINT</b> (with the same cards) it is <b>MANDATORY</b> that <b>ALL</b> the old players connect. If this is not possible, the hand that was in progress when the game was interrupted will be lost.\n\n3) <b>New players</b> are allowed to join the game (they will be the first hand as spectators).
