ui.shuffle_info_msg=When I started developing the game, one of the things that worried me was to get the cards shuffled in the best possible way, taking into account the bad reputation that computers have for generating random numbers. Among my friends there were jokes about this matter and I wanted to settle any suspicion.\n\nNORMAL MODE: this mode uses the Fisher-Yates algorithm to shuffle a deck (ordered by default) using a cryptographically secure PSEUDORANDOM number generator based on the HASH DRBG SHA-512 algorithm. This method of shuffling is capable (theoretically) of unpredictably and equiprobably generating any of the possible permutations of a poker deck, namely:\n52! = 80 658 175 170 943 878 571 660 636 856 403 766 975 289 505 440 883 277 824 000 000 000 000\n\nCASINO MODE: this mode uses the Random.org API to obtain a permutation of 52 elements. The randomness of Random.org comes from a TRUE RANDOM number generator obtained from ATMOSPHERIC NOISE, thus being capable of generating any of the possible permutations of a poker deck unpredictably and equiprobably.\n\nPARANOID MODE: this mode is a HYBRID between the CASINO and NORMAL modes. First it shuffles using the CASINO MODE and then it shuffles again using the NORMAL MODE. This way, in a hypothetical and VERY unlikely case that the permutation returned by Random.org was not totally random for any reason (fortuitous or malicious), it would be neutralized by reshuffling.
ui.shuffle_info_title=What are the CoronaPoker shuffling modes?
