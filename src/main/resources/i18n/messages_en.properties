zero_trust.rotation_refused=A connected player refused to deliver their deck-rotation key. The game is halted; they will need to justify their refusal to be re-admitted.
zero_trust.pocket_unlock_refused=A connected player refused to deliver their key to decrypt pocket cards. The game is halted; they will need to justify their refusal to be re-admitted.
zero_trust.community_unlock_refused=A connected player refused to deliver their key to reveal community cards. The game is halted; they will need to justify their refusal to be re-admitted.
zero_trust.host_showdown_sig_missing=A showdown key was received from the server WITHOUT the author's cryptographic signature, or with a malformed signature. The server may be substituting the key on the wire.
zero_trust.host_showdown_sig_invalid=A showdown key was received from the server with an INVALID cryptographic signature. The server may be substituting the key on the wire.
zero_trust.host_potcards_mismatch=The showdown plaintext sent by the server DOES NOT MATCH the result of decrypting your local piece with the signed key. The server may be sending fake cards at showdown.
zero_trust.host_community_garbage=The cryptographic community-card data received from the server is inconsistent (the piece does not decrypt to a valid deck card, or does not match the server's signed announcement). Possible causes: a BUG in some version of the software, a server version whose code may have been altered, or local identity-key corruption. The client cannot tell the difference and is NOT accusing anyone.
zero_trust.host_unlock_out_of_order=A decryption request has been received from the server out of sequence (wrong street, repeated slot, phase out of order, or request issued before the previous street closed).
zero_trust.host_cascade_mid_hand=A shuffle restart request has been received from the server in the middle of an ongoing hand (would overwrite my decryption key).
zero_trust.host_pocket_extraction=A decryption request has been received from the server that would affect YOUR OWN private cards.
zero_trust.host_community_extraction=A decryption request has been received from the server that would reveal a community card ahead of time.
zero_trust.host_rotation_replay=The server requested a second card rotation in the same hand. The legitimate rotation is unique per hand; a repeat suggests an attempt to use your client to decrypt other players' cards.
zero_trust.suspicious_alert=⚠️ [ANOMALOUS SERVER BEHAVIOUR]
zero_trust.suspicious_header=Your client has detected anomalous server behaviour (not a critical incident that freezes the game):\n
zero_trust.suspicious_body=Your client rejected the anomalous operation and the game CAN continue. We assume good faith: this could be a software BUG (client or server) and nobody is being accused. But since a bug cannot be told apart from tampering, FOR YOUR SAFETY IT IS STRONGLY RECOMMENDED TO LEAVE this table using the 'Leave' button (your money will NOT be processed in this hand).
zero_trust.host_bad_wire=A decryption request has been received from the server with an invalid format or points that do not belong to the cryptographic curve.
