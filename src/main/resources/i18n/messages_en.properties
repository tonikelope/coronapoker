game.popup_verificacion_firma_invalida=During this hand, one or more participants ({0}) detected an invalid cryptographic signature on some action.\n\nThe data received by all peers was consistent (final chain hashes matched) but the content of at least one action was not properly signed by whoever should have signed it.\n\nCoronaPoker is free and open-source software: any participant may have been running a modified version that produces malformed signatures, or it is a software bug in some version.\n\nThe hand has been settled normally. As a precaution it is recommended to leave the game.
game.popup_verificacion_titulo_alerta=Cryptographic verification divergence
game.popup_verificacion_titulo_aviso=Cryptographic verification incomplete
game.popup_verificacion_divergente=One or more participants of this game reported a different cryptographic verification of the final hand state.\n\nCoronaPoker is free and open-source software: the code is publicly available, and any participant — the game host or any of the connected players — may have modified it to alter the normal behaviour of the game. The divergence may also be caused by a software bug in some version.\n\nIt is not possible to determine automatically which of the two has happened, or who caused it. The hand data has been saved locally as evidence so any participant can analyse it later.\n\nThe hand has been settled normally. As a precaution it is recommended to leave the game.
game.popup_verificacion_ausente=Could not verify consensus of the last hand: player {0} did not send a closing signature.\n\nThis may be due to a network outage, a client crash, or a modified version of the software (since it is open source, any participant may be running an altered version). The hand has been settled normally.
