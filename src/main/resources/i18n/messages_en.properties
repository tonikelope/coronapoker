shuffle.cuando_empece_a_desarrollar_el=When I started developing the game, one of the things that worried me was getting the cards shuffled in the best possible way given the bad reputation computers have for generating random numbers. There were jokes about this among my friends and I wanted to settle any suspicions.\n<h2>What are CoronaPoker's shuffling modes?</h2><b>NORMAL MODE:</b> this mode uses the Fisher-Yates algorithm to shuffle a deck (ordered by default) using a cryptographically secure PSEUDORANDOM number generator based on the HASH DRBG SHA-512 algorithm. This shuffling method is capable (theoretically) of generating unpredictably and equiprobably any of the possible permutations of a poker deck, namely:\n52! = 80 658 175 170 943 878 571 660 636 856 403 766 975 289 505 440 883 277 824 000 000 000 000\n\n<b>CASINO MODE:</b> this mode uses the Random.org API to get a 52-element permutation. Random.org's randomness comes from a TRUE RANDOM number generator derived from ATMOSPHERIC NOISE, thus being able to generate any of the possible permutations of a poker deck unpredictably and equiprobably.\n\n<b>PARANOID MODE:</b> this mode is a HYBRID between CASINO and NORMAL modes. It first shuffles using CASINO MODE and then reshuffles using NORMAL MODE. This way, in the VERY unlikely hypothetical case that the permutation returned by Random.org was not totally random for any reason (accidental or malicious), reshuffling neutralizes it.
