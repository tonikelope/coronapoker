shuffle.cuando_empece_a_desarrollar_el=When I started to develop the game, one of the things that worried me was to get the cards shuffled in the best possible way taking into account the bad reputation that computers have for generating random numbers. Among my friends there were jokes about this subject and I wanted to put an end to any suspicion.\n<h2>What are the shuffling modes of CoronaPoker?</h2><b>NORMAL MODE:</b> this mode uses the Fisher-Yates algorithm to shuffle a deck (by default sorted) employing a cryptographically secure PSEUDORANDOM number generator based on the HASH DRBG SHA-512 algorithm. This shuffling method is able (in theory) to generate in an unpredictable and equiprobable way any of the possible permutations of a poker deck, namely:\n52! = 80 658 175 170 170 943 878 571 660 636 856 403 766 975 289 505 440 883 277 824 000 000 000 000 000\n\n<b>CASINO MODE:</b> this mode uses the Random.org API to obtain a permutation of 52 elements. The randomness of Random.org comes from a TRUE RANDOM number generator obtained from ATMOSPHERIC NOISE, and is therefore capable of generating any of the possible permutations of a poker deck in an unpredictable and equiprobable way.\n\n<b>PARANOID MODE:</b> this mode is a HYBRID between CASINO MODE and NORMAL MODE. First it is shuffled with the CASINO MODE and then it is shuffled again with the NORMAL MODE. In this way, in a hypothetical and VERY unlikely case that the permutation returned by Random.org was not totally random for any reason (fortuitous or malicious), when shuffling again it would be neutralized.
