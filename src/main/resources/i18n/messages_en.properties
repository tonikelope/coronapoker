ui.identicon.self_explicacion=This is your public key. You can share this image or its hex fingerprint through a secure external channel (WhatsApp, Telegram, voice...) so other players can verify your identity.
ui.identicon.session_explicacion=Each icon is the visual fingerprint (derived from the AES key) of an encrypted network channel. Both ends of the same channel must see the SAME icon. Compare it with the other player through a secure external channel (voice, WhatsApp, Telegram...): if it matches, nobody is intercepting the connection; if it differs, there is a man-in-the-middle (MITM) on the network and you should disconnect.
