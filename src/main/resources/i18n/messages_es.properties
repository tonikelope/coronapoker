zero_trust.rotation_refused=Un jugador conectado se ha negado a entregar su clave de rotación del mazo. La timba se detiene; este jugador deberá justificar su negativa para volver a ser admitido.
zero_trust.pocket_unlock_refused=Un jugador conectado se ha negado a entregar su clave para descifrar las cartas privadas. La timba se detiene; este jugador deberá justificar su negativa para volver a ser admitido.
zero_trust.community_unlock_refused=Un jugador conectado se ha negado a entregar su clave para destapar las cartas comunitarias. La timba se detiene; este jugador deberá justificar su negativa para volver a ser admitido.
zero_trust.host_showdown_sig_missing=Se ha recibido del servidor una clave del showdown SIN firma criptográfica del autor, o con firma con formato inválido. El servidor podría estar substituyendo la clave en la red.
zero_trust.host_showdown_sig_invalid=Se ha recibido del servidor una clave del showdown con una firma criptográfica INVÁLIDA. El servidor podría estar substituyendo la clave en la red.
zero_trust.host_potcards_mismatch=El plaintext de showdown enviado por el servidor NO COINCIDE con el resultado de descifrar tu pieza local con la clave firmada. El servidor podría estar enviando cartas falsas en el showdown.
zero_trust.host_community_garbage=Los datos criptogr\u00e1ficos de la carta comunitaria recibidos del servidor no son consistentes (la pieza no descifra a una carta v\u00e1lida del mazo, o no coincide con el anuncio firmado por el servidor). Las causas posibles son: un BUG en alguna versi\u00f3n del software, una versi\u00f3n del servidor cuyo c\u00f3digo podr\u00eda haber sido alterado, o una corrupci\u00f3n local de las claves de identidad. Desde el cliente no es posible distinguir entre ellas y NO se acusa a nadie.
zero_trust.host_unlock_out_of_order=Se ha recibido del servidor una petici\u00f3n de descifrado fuera de secuencia (calle equivocada, slot repetido, phase fuera de orden o petici\u00f3n adelantada antes de cerrar la calle previa).
zero_trust.host_cascade_mid_hand=Se ha recibido del servidor una petici\u00f3n de reinicio del barajado en medio de una mano ya iniciada (sobrescribir\u00eda mi clave de descifrado).
zero_trust.host_pocket_extraction=Se ha recibido del servidor una petici\u00f3n de descifrado que afectar\u00eda a TUS PROPIAS cartas privadas.
zero_trust.host_community_extraction=Se ha recibido del servidor una petici\u00f3n de descifrado que revelar\u00eda una carta comunitaria antes de tiempo.
zero_trust.host_rotation_replay=El servidor ha solicitado una segunda rotaci\u00f3n de cartas en la misma mano. La rotaci\u00f3n leg\u00edtima es \u00fanica por mano; una repetici\u00f3n sugiere un intento de usar tu cliente para descifrar cartas ajenas.
zero_trust.host_shuffle_proof_failed=La verificaci\u00f3n del reparto ha fallado: no se ha podido demostrar que el mazo que reparti\u00f3 el servidor sea un barajado honesto del mazo g\u00e9nesis. Puede ser un bug o un intento de manipular el reparto. Puedes seguir jugando, pero se recomienda encarecidamente abandonar esta mesa.
zero_trust.host_shuffle_proof_missing=El reparto ha llegado sin una prueba verificable de barajado honesto para el mazo de esta mano, y ahora se est\u00e1n revelando cartas comunitarias. Puede ser un bug o un retraso de red, o un host intentando manipular el reparto. Puedes seguir jugando, pero se recomienda encarecidamente abandonar esta mesa.
zero_trust.suspicious_alert=\u26a0\ufe0f [COMPORTAMIENTO AN\u00d3MALO DEL SERVIDOR]
zero_trust.suspicious_header=Tu cliente ha detectado un comportamiento an\u00f3malo del servidor (no es una incidencia cr\u00edtica que congele la partida):\n
zero_trust.suspicious_body=Tu cliente ha rechazado la operaci\u00f3n an\u00f3mala y la partida PUEDE continuar. Presumimos buena fe: esto podr\u00eda deberse a un BUG del software (del cliente o del servidor) y NO se acusa a nadie. Pero como no es posible distinguir un bug de una manipulaci\u00f3n, POR SEGURIDAD SE RECOMIENDA ENCARECIDAMENTE ABANDONAR esta mesa usando el bot\u00f3n 'Salir' (tu dinero NO se procesar\u00e1 en esta mano).
zero_trust.host_bad_wire=Se ha recibido del servidor una petici\u00f3n de descifrado con formato inv\u00e1lido o puntos que no pertenecen a la curva criptogr\u00e1fica.
zero_trust.cheater_detected=[ZERO-TRUST] Se ha detectado alg\u00fan jugador con una versi\u00f3n de CoronaPoker modificada, lo que sugiere que probablemente trate de hacer trampas. \u00bfQuieres continuar?
zero_trust.corrupted_mac_action=El Servidor ha intentado procesar una acci\u00f3n con una firma criptogr\u00e1fica inv\u00e1lida (MAC corrupto) a nombre de:
zero_trust.critical=\u274c [ZERO-TRUST] ALERTA CR\u00cdTICA: FIRMA INV\u00c1LIDA O CONSENSO ROTO.
zero_trust.critical_alert_body=ESTADO DE CUARENTENA ACTIVADO:\nTu cliente NO enviar\u00e1 m\u00e1s claves criptogr\u00e1ficas al servidor durante esta sesi\u00f3n.\nLa partida queda matem\u00e1ticamente congelada para proteger tu saldo.\n\nLas causas POSIBLES son:\n  - un BUG en el c\u00f3digo del propio cliente,\n  - un BUG en el c\u00f3digo del servidor, o\n  - un SERVIDOR cuyo c\u00f3digo podr\u00eda haber sido alterado.\n\nDesde el cliente no es posible distinguir entre ellas y NO se acusa a nadie. Por seguridad, y a la espera de poder revisar el origen, SE RECOMIENDA ABANDONAR esta partida usando el bot\u00f3n 'Salir' (tu dinero NO se procesar\u00e1 en esta mano).
zero_trust.critical_alert_header=\u00a1INCIDENCIA ZERO-TRUST!\n\nTu cliente ha detectado una anomal\u00eda en el protocolo criptogr\u00e1fico:\n
