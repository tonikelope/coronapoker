zero_trust.peer_sra_corrupt=La firma del showdown es genuina pero la clave SRA del peer no resuelve cartas válidas. Esto solo ocurre si el peer firmó intencionalmente una clave corrupta o si su cliente está bugueado. No podemos distinguir y por seguridad terminamos la partida.
