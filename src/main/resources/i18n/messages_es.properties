player.en_el_bmodo_recuperacionb_se=En el <b>MODO RECUPERACI\u00d3N</b> se continuar\u00e1 la timba anterior desde donde se par\u00f3:\n\n1) Es <b>OBLIGATORIO</b> que los jugadores antiguos usen los <b>MISMOS NICKS</b>.\n\n2) Para poder continuar desde el <b>PUNTO EXACTO</b> de la mano es <b>OBLIGATORIO</b> que se conecten <b>TODOS</b> los jugadores antiguos. Si esto no fuera posible, se "perder\u00e1" la mano que estaba en curso cuando se interrumpi\u00f3 la timba.\n\n3) Est\u00e1 permitido que se unan a la timba <b>jugadores nuevos</b> (estar\u00e1n la primera mano de espectadores).
