game.mano_verificacion_divergente=\u26a0 DIVERGENCIA EN VERIFICACI\u00d3N CRIPTOGR\u00c1FICA \u00b7 uno o m\u00e1s participantes reportaron un estado final de mano distinto \u00b7 evidencia guardada
game.mano_verificacion_jugador_ausente=\u26a0 Aviso: {0} no envi\u00f3 firma de cierre \u00b7 mano liquidada
game.mano_verificacion_firma_invalida=\u26a0 Aviso: {0} detectaron una firma criptogr\u00e1fica inv\u00e1lida durante esta mano \u00b7 evidencia guardada \u00b7 mano liquidada
game.popup_verificacion_firma_invalida=Durante esta mano, uno o m\u00e1s participantes ({0}) detectaron una firma criptogr\u00e1fica inv\u00e1lida en alguna acci\u00f3n.\n\nLos datos recibidos por todos los peers eran consistentes (las cadenas H_final coinciden), pero el contenido de al menos una acci\u00f3n no estaba bien firmado por quien deber\u00eda haberla firmado.\n\nCoronaPoker es software libre y de c\u00f3digo abierto: cualquier participante puede haber ejecutado una versi\u00f3n modificada que produce firmas mal formadas, o se trata de un fallo de software en alguna versi\u00f3n.\n\nLa mano se ha liquidado normalmente. Por precauci\u00f3n se recomienda abandonar la partida.
game.mano_verificacion_host_sin_prueba=\u26a0 Aviso: a {0} no les lleg\u00f3 la prueba de barajado honesto de esta mano \u00b7 evidencia guardada \u00b7 mano liquidada
game.popup_verificacion_host_sin_prueba=En esta mano, a uno o m\u00e1s participantes ({0}) no les lleg\u00f3 la prueba de barajado honesto (la garant\u00eda criptogr\u00e1fica de que el mazo se reparti\u00f3 sin trampas).\n\nLas cadenas H_final coinciden en todos los peers, as\u00ed que las acciones de la mano son consistentes. Un host correcto siempre env\u00eda esta prueba, por lo que su ausencia \u2014 sobre todo si se repite, o si solo le falta a algunos participantes \u2014 podr\u00eda significar que el host ejecuta una versi\u00f3n modificada que la omite, o un fallo de software.\n\nCoronaPoker es software libre y de c\u00f3digo abierto. La mano se ha liquidado normalmente. Como precauci\u00f3n se recomienda abandonar la partida.
game.popup_verificacion_titulo_alerta=Verificaci\u00f3n criptogr\u00e1fica divergente
game.popup_verificacion_titulo_aviso=Verificaci\u00f3n criptogr\u00e1fica incompleta
game.popup_verificacion_divergente=Uno o m\u00e1s participantes de esta partida reportaron una verificaci\u00f3n criptogr\u00e1fica distinta del estado final de la mano.\n\nCoronaPoker es software libre y de c\u00f3digo abierto: el c\u00f3digo est\u00e1 disponible p\u00fablicamente, y cualquier participante \u2014 el anfitri\u00f3n de la partida o cualquiera de los jugadores conectados \u2014 puede haberlo modificado para alterar el comportamiento normal del juego. La divergencia tambi\u00e9n puede deberse a un fallo de software en alguna versi\u00f3n.\n\nNo es posible determinar autom\u00e1ticamente cu\u00e1l de las dos cosas ha pasado ni qui\u00e9n la ha causado. Los datos de la mano se han guardado localmente como evidencia para que cualquier participante pueda analizarlos despu\u00e9s.\n\nLa mano se ha liquidado normalmente. Por precauci\u00f3n se recomienda abandonar la partida.
game.popup_verificacion_ausente=No se pudo verificar el consenso de la \u00faltima mano: el jugador {0} no envi\u00f3 su firma de cierre.\n\nEsto puede deberse a un corte de red, a un crash del cliente, o a una versi\u00f3n modificada del software (al ser c\u00f3digo abierto, cualquier participante puede ejecutar una versi\u00f3n alterada). La mano se ha liquidado normalmente.
